services:
  api:
    build:
      context: ..
      dockerfile: Dockerfile.api
    container_name: float-api
    environment:
      DATABASE_URL: postgres://float:float@db:5432/float
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      PORT: "3000"
      FILES_DIR: /app/files
    volumes:
      - float-files:/app/files
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
      dockerfile: ../Dockerfile.frontend
    container_name: float-frontend
    environment:
      PORT: "3001"
      API_URL: http://api:3000
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    container_name: float-caddy
    ports:
      - "8888:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
    depends_on:
      - api
      - frontend
    restart: unless-stopped

  db:
    image: postgres:16
    container_name: float-db
    environment:
      POSTGRES_USER: float
      POSTGRES_PASSWORD: float
      POSTGRES_DB: float
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U float"]
      interval: 2s
      start_period: 10s
    restart: unless-stopped

volumes:
  pgdata:
  float-files:
