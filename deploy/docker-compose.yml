services:
  api:
    build:
      context: ..
      dockerfile: Dockerfile.api
    container_name: float-api
    environment:
      DATABASE_URL: sqlite:///app/data/float.db?mode=rwc
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      PORT: "3000"
      FILES_DIR: /app/files
    volumes:
      - float-files:/app/files
      - float-data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
      dockerfile: ../Dockerfile.frontend
    container_name: float-frontend
    environment:
      PORT: "3001"
      API_URL: http://api:3000
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    container_name: float-caddy
    ports:
      - "8888:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
    depends_on:
      - api
      - frontend
    restart: unless-stopped

volumes:
  float-files:
  float-data:
